<script>
        // Simple micro-interaction for orbital arc rotation
        document.addEventListener('mousemove', (e) => {
            const arc = document.querySelector('.orbital-arc');
            if (arc) {
                const mouseX = e.clientX / window.innerWidth;
                const mouseY = e.clientY / window.innerHeight;
                arc.style.transform = `rotate(${45 + (mouseX * 20)}deg)`;
            }
        });

        // Toggle dark mode (optional functionality)
        const toggleDarkMode = () => {
            document.documentElement.classList.toggle('dark');
        };
